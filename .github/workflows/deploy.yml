name: CI / Deploy Backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy to Render after CI passes?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  # ── Quality checks ────────────────────────────────────────────────────────
  ci:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        # CI=true makes husky skip its prepare hook in CI environments
        run: npm ci
        env:
          CI: true
          HUSKY: 0

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          # Provide stub values so env validation passes in tests
          MONGODB_URI: mongodb://localhost:27017/test
          JWT_SECRET: test-secret-for-ci-only

  # ── Deploy to Render ──────────────────────────────────────────────────────
  # Only runs on pushes to main (not on pull requests)
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: ci
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy == 'true')

    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -o /dev/null \
            -w "HTTP status: %{http_code}\n"
